# .github/workflows/deploy-staging.yml
# Deploys to minka-system-stg GCP project on push to staging branch
#
# Place this file at .github/workflows/deploy-staging.yml in the forked nanoclaw-minka repo
# Prerequisites: Terraform must have been applied (creates deploy SA, WIF binding, GCE instance, AR)

name: Deploy to Staging

on:
  push:
    branches: [staging]

concurrency:
  group: deploy-staging
  cancel-in-progress: false  # Don't cancel in-flight deploys

env:
  GCP_PROJECT: minka-system-stg
  GCP_REGION: us-central1
  GCE_INSTANCE: nanoclaw-stg
  GCE_ZONE: us-central1-a
  AR_REPO: us-central1-docker.pkg.dev/minka-system-stg/minka-system

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run build

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test

  build-agent-image:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # For Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build agent container image
        run: |
          docker build \
            -t ${{ env.AR_REPO }}/nanoclaw-agent:${{ github.sha }} \
            -t ${{ env.AR_REPO }}/nanoclaw-agent:latest \
            -f container/Dockerfile \
            container/

      - name: Push agent container image
        run: |
          docker push ${{ env.AR_REPO }}/nanoclaw-agent:${{ github.sha }}
          docker push ${{ env.AR_REPO }}/nanoclaw-agent:latest

  deploy:
    needs: build-agent-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Package source for VM
        # Tar the workspace minus build artifacts. The VM installs deps and
        # builds in place — keeps the artifact small and avoids platform
        # mismatches between the runner and the VM.
        run: |
          tar czf /tmp/nanoclaw-source.tgz \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            .

      - name: Clean stale source tarball
        # Previous deploy may have left /tmp/nanoclaw-source.tgz with non-deploy
        # ownership (e.g. nanoclaw via earlier chown), which blocks scp from
        # overwriting. Remove first.
        run: |
          gcloud compute ssh ${{ env.GCE_INSTANCE }} \
            --zone=${{ env.GCE_ZONE }} \
            --project=${{ env.GCP_PROJECT }} \
            --tunnel-through-iap \
            --command="sudo rm -f /tmp/nanoclaw-source.tgz"

      - name: Push source to VM
        run: |
          gcloud compute scp /tmp/nanoclaw-source.tgz \
            --zone=${{ env.GCE_ZONE }} \
            --project=${{ env.GCP_PROJECT }} \
            --tunnel-through-iap \
            ${{ env.GCE_INSTANCE }}:/tmp/nanoclaw-source.tgz

      - name: Deploy to GCE instance
        run: |
          gcloud compute ssh ${{ env.GCE_INSTANCE }} \
            --zone=${{ env.GCE_ZONE }} \
            --project=${{ env.GCP_PROJECT }} \
            --tunnel-through-iap \
            --command="$(cat <<'SCRIPT'
          set -euo pipefail

          # Make /mnt/data/nanoclaw writable by the nanoclaw user (the daemon
          # runs as nanoclaw and that user is in the docker group). The
          # tarball stays owned by the deploy SA's user — readable to all.
          sudo install -d -o nanoclaw -g nanoclaw /mnt/data/nanoclaw

          # Pull the agent image as root: the setup script configured docker
          # auth for /root only (gcloud-as-cred-helper); snap-installed gcloud
          # refuses home dirs outside /home so configuring it for the nanoclaw
          # user is non-trivial. Image cache is shared across users — nanoclaw
          # can run containers from this image without its own auth.
          sudo docker pull ${{ env.AR_REPO }}/nanoclaw-agent:latest

          # Unpack source, install deps, build — all as nanoclaw so file
          # ownership stays consistent.
          sudo -u nanoclaw bash <<'NANOCLAW_OPS'
          set -euo pipefail
          cd /mnt/data/nanoclaw
          tar xzf /tmp/nanoclaw-source.tgz
          npm ci
          npm run build
          NANOCLAW_OPS

          # Restart the orchestrator. ExecStartPre fetches secrets from
          # Secret Manager and writes them to the env file before start.
          sudo systemctl restart nanoclaw

          # Poll /health for up to 60s.
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "Health check passed"
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed after 60s"
          sudo journalctl -u nanoclaw --no-pager -n 80
          exit 1
          SCRIPT
          )"

      - name: Post deployment status
        if: failure()
        run: |
          echo "::error::Staging deployment failed. Check GCE instance logs."
